name: Build and Release FlashYT

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag (leave blank for auto)'
        required: false
        default: ''

jobs:
  test:
    name: Run Python Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Test Dependencies
        run: pip install -r host/requirements-dev.txt

      - name: Run pytest
        run: python -m pytest host/tests/ -v

  build-windows:
    needs: [test]
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Python Tools
        run: pip install pyinstaller pystray Pillow setuptools pywin32

      - name: Download yt-dlp.exe
        run: |
          mkdir vendor
          curl -L "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -o vendor\yt-dlp.exe

      - name: Download ffmpeg.exe
        run: |
          curl -L "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -o ffmpeg.zip
          7z e ffmpeg.zip -ovendor ffmpeg-master-latest-win64-gpl/bin/ffmpeg.exe -r
          del ffmpeg.zip

      - name: Install Inno Setup 6
        run: choco install innosetup --yes --no-progress

      - name: Build Executable Binaries (PyInstaller)
        shell: pwsh
        run: cmd /c scripts\build_windows.bat

      - name: Sign Windows Binaries (optional)
        if: ${{ env.HAS_CERT == 'true' }}
        env:
          HAS_CERT: ${{ secrets.WINDOWS_CERT_BASE64 != '' && secrets.WINDOWS_CERT_PASSWORD != '' }}
          CERT_B64: ${{ secrets.WINDOWS_CERT_BASE64 }}
          CERT_PASS: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        shell: pwsh
        run: |
          $pfxPath = "$env:RUNNER_TEMP\flashyt-codesign.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:CERT_B64))
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\**\x64\signtool.exe" -ErrorAction SilentlyContinue | Sort-Object FullName -Descending | Select-Object -First 1).FullName
          if (-not $signtool) { throw "signtool.exe not found on runner" }
          & $signtool sign /fd SHA256 /f $pfxPath /p $env:CERT_PASS /tr http://timestamp.digicert.com /td SHA256 "host\dist\host.exe"
          & $signtool sign /fd SHA256 /f $pfxPath /p $env:CERT_PASS /tr http://timestamp.digicert.com /td SHA256 "scripts\dist\detect_ext.exe"
          & $signtool sign /fd SHA256 /f $pfxPath /p $env:CERT_PASS /tr http://timestamp.digicert.com /td SHA256 "scripts\dist\register_host_windows.exe"
          & $signtool sign /fd SHA256 /f $pfxPath /p $env:CERT_PASS /tr http://timestamp.digicert.com /td SHA256 "dist\FlashYT-setup.exe"
          Remove-Item $pfxPath -Force

      - name: Upload Windows Installer Payload
        uses: actions/upload-artifact@v4
        with:
          name: flashyt-windows-setup
          path: dist/FlashYT-setup.exe

  build-mac-linux:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Make install.sh executable
        run: chmod +x install.sh

      - name: Upload Bash Installer Payload
        uses: actions/upload-artifact@v4
        with:
          name: flashyt-install-bundle
          path: |
            install.sh
            host/
            scripts/
          
  release:
    needs: [build-windows, build-mac-linux]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: flashyt-windows-setup
          
      - name: Download Mac/Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: flashyt-install-bundle
          path: mac_linux_bundle
          
      - name: Zip Mac/Linux Resources
        run: |
          cd mac_linux_bundle
          zip -r ../FlashYT-linux-macos-bundle.zip .
          cd ..
          
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: |
            FlashYT-setup.exe
            FlashYT-linux-macos-bundle.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
