name: Build and Release FlashYT

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag (leave blank for auto)'
        required: false
        default: ''

jobs:
  test:
    name: Run Python Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Test Dependencies
        run: pip install -r host/requirements-dev.txt

      - name: Run pytest
        run: python -m pytest host/tests/ -v

  build-windows:
    needs: [test]
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Python Tools
        run: pip install pyinstaller pystray Pillow setuptools pywin32

      - name: Download yt-dlp.exe
        run: |
          mkdir vendor
          curl -L "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -o vendor\yt-dlp.exe

      - name: Download ffmpeg.exe
        shell: pwsh
        run: |
          $url = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          Invoke-WebRequest $url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_extracted -Force
          $ffmpeg = Get-ChildItem ffmpeg_extracted -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          Copy-Item $ffmpeg.FullName vendor\ffmpeg.exe
          Remove-Item ffmpeg.zip, ffmpeg_extracted -Recurse -Force

      - name: Install Inno Setup 6
        run: choco install innosetup --yes --no-progress

      - name: Install Python Requirements
        run: pip install -r host/requirements.txt pyinstaller pywin32

      - name: Build host.exe (PyInstaller)
        shell: pwsh
        run: |
          pyinstaller --clean --onefile --noconsole --name host `
            --noupx `
            --paths host `
            --distpath host/dist `
            --workpath host/build `
            --hidden-import=pystray._win32 `
            --hidden-import=pystray._base `
            --hidden-import=PIL.Image `
            --collect-all pystray `
            host/host.py
          if (-not $?) { exit 1 }

      - name: Build detect_ext.exe (PyInstaller)
        shell: pwsh
        run: |
          pyinstaller --clean --onefile --console --noupx --name detect_ext `
            --paths scripts `
            --distpath scripts/dist `
            --workpath scripts/build `
            scripts/detect_extension_id.py
          if (-not $?) { exit 1 }

      - name: Build register_host_windows.exe (PyInstaller)
        shell: pwsh
        run: |
          pyinstaller --clean --onefile --console --noupx --name register_host_windows `
            --distpath scripts/dist `
            --workpath scripts/build `
            scripts/register_host_windows.py
          if (-not $?) { exit 1 }

      - name: Verify Source Files
        shell: pwsh
        run: |
          $files = @(
            "host/dist/host.exe",
            "vendor/yt-dlp.exe",
            "vendor/ffmpeg.exe",
            "host/com.youtube.native.ext.json",
            "scripts/dist/detect_ext.exe",
            "scripts/dist/register_host_windows.exe"
          )
          foreach ($f in $files) {
            if (-not (Test-Path $f)) {
              Write-Error "CRITICAL: Missing required file $f"
              exit 1
            } else {
              Write-Host "✓ Found $f"
            }
          }
          Get-ChildItem -Path extension -Recurse | Select-Object FullName

      - name: Compile Inno Setup Installer
        shell: pwsh
        run: |
          mkdir dist -ErrorAction SilentlyContinue
          iscc installer_windows.iss /O"dist" /F"FlashYT-setup" | Out-File -FilePath iscc_log.txt
          if (-not $?) {
            Get-Content iscc_log.txt
            exit 1
          }
          Write-Host "Installer compiled successfully."

      - name: Sign Windows Binaries (optional)
        if: ${{ env.HAS_CERT == 'true' }}
        env:
          HAS_CERT: ${{ secrets.WINDOWS_CERT_BASE64 != '' && secrets.WINDOWS_CERT_PASSWORD != '' }}
          CERT_B64: ${{ secrets.WINDOWS_CERT_BASE64 }}
          CERT_PASS: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        shell: pwsh
        run: |
          $pfxPath = "$env:RUNNER_TEMP\flashyt-codesign.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:CERT_B64))
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\**\x64\signtool.exe" -ErrorAction SilentlyContinue | Sort-Object FullName -Descending | Select-Object -First 1).FullName
          if (-not $signtool) { throw "signtool.exe not found on runner" }
          & $signtool sign /fd SHA256 /f $pfxPath /p $env:CERT_PASS /tr http://timestamp.digicert.com /td SHA256 "host\dist\host.exe"
          & $signtool sign /fd SHA256 /f $pfxPath /p $env:CERT_PASS /tr http://timestamp.digicert.com /td SHA256 "scripts\dist\detect_ext.exe"
          & $signtool sign /fd SHA256 /f $pfxPath /p $env:CERT_PASS /tr http://timestamp.digicert.com /td SHA256 "scripts\dist\register_host_windows.exe"
          & $signtool sign /fd SHA256 /f $pfxPath /p $env:CERT_PASS /tr http://timestamp.digicert.com /td SHA256 "dist\FlashYT-setup.exe"
          Remove-Item $pfxPath -Force

      - name: Upload Windows Installer Payload
        uses: actions/upload-artifact@v4
        with:
          name: flashyt-windows-setup
          path: dist/FlashYT-setup.exe

  build-mac-linux:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Make install.sh executable
        run: chmod +x install.sh

      - name: Upload Bash Installer Payload
        uses: actions/upload-artifact@v4
        with:
          name: flashyt-install-bundle
          path: |
            install.sh
            host/
            scripts/
          
  release:
    needs: [build-windows, build-mac-linux]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: flashyt-windows-setup
          
      - name: Download Mac/Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: flashyt-install-bundle
          path: mac_linux_bundle
          
      - name: Zip Mac/Linux Resources
        run: |
          cd mac_linux_bundle
          zip -r ../FlashYT-linux-macos-bundle.zip .
          cd ..
          
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: |
            FlashYT-setup.exe
            FlashYT-linux-macos-bundle.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
