name: Build and Release YouTube Native Downloader

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Python Tools
        run: pip install pyinstaller pystray Pillow setuptools

      - name: Download yt-dlp.exe
        run: |
          mkdir vendor
          curl -L "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -o vendor\yt-dlp.exe

      - name: Download ffmpeg.exe
        run: |
          curl -L "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -o ffmpeg.zip
          7z e ffmpeg.zip -ovendor ffmpeg-master-latest-win64-gpl/bin/ffmpeg.exe -r
          del ffmpeg.zip

      - name: Build Executable Binaries (PyInstaller)
        shell: cmd
        run: scripts\build_windows.bat

      - name: Sign Windows Binaries (optional)
        if: ${{ secrets.WINDOWS_CERT_BASE64 != '' && secrets.WINDOWS_CERT_PASSWORD != '' }}
        shell: pwsh
        run: |
          $pfxPath = "$env:RUNNER_TEMP\flashyt-codesign.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String("${{ secrets.WINDOWS_CERT_BASE64 }}"))
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\**\x64\signtool.exe" -ErrorAction SilentlyContinue | Sort-Object FullName -Descending | Select-Object -First 1).FullName
          if (-not $signtool) { throw "signtool.exe not found on runner" }
          & $signtool sign /fd SHA256 /f $pfxPath /p "${{ secrets.WINDOWS_CERT_PASSWORD }}" /tr http://timestamp.digicert.com /td SHA256 "host\dist\host.exe"
          & $signtool sign /fd SHA256 /f $pfxPath /p "${{ secrets.WINDOWS_CERT_PASSWORD }}" /tr http://timestamp.digicert.com /td SHA256 "scripts\dist\detect_ext.exe"
          & $signtool sign /fd SHA256 /f $pfxPath /p "${{ secrets.WINDOWS_CERT_PASSWORD }}" /tr http://timestamp.digicert.com /td SHA256 "scripts\dist\register_host_windows.exe"
          & $signtool sign /fd SHA256 /f $pfxPath /p "${{ secrets.WINDOWS_CERT_PASSWORD }}" /tr http://timestamp.digicert.com /td SHA256 "dist\youtube-native-downloader-setup.exe"
          Remove-Item $pfxPath -Force

      - name: Upload Windows Installer Payload
        uses: actions/upload-artifact@v4
        with:
          name: youtube-native-downloader-setup
          path: dist/youtube-native-downloader-setup.exe

  build-mac-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Make install.sh executable
        run: chmod +x install.sh

      - name: Upload Bash Installer Payload
        uses: actions/upload-artifact@v4
        with:
          name: native-downloader-install-sh
          path: |
            install.sh
            host/
            scripts/
          
  release:
    needs: [build-windows, build-mac-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: youtube-native-downloader-setup
          
      - name: Download Mac/Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: native-downloader-install-sh
          path: mac_linux_bundle
          
      - name: Zip Mac/Linux Resources
        run: |
          cd mac_linux_bundle
          zip -r ../youtube-native-ext-linux-mac.zip .
          cd ..
          
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            youtube-native-downloader-setup.exe
            youtube-native-ext-linux-mac.zip
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
